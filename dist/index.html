<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Primal Fracture</title>
    <!-- Tailwind CSS for styling since app.tsx uses tailwind classes -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Inter:wght@400;700;900&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
      body, html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background-color: #000;
        overflow: hidden;
        font-family: 'Inter', 'Outfit', system-ui, sans-serif;
      }
      #root {
        width: 100%;
        height: 100%;
      }
      .font-display { font-family: 'Bebas Neue', Impact, sans-serif; }
      .font-narrative { font-family: 'Playfair Display', Georgia, serif; }
      .font-ui { font-family: 'Outfit', 'Inter', system-ui, sans-serif; }
      @keyframes kill-pulse { 
        0%,100% { text-shadow: 0 0 20px rgba(239,68,68,0.5); }
        50% { text-shadow: 0 0 40px rgba(239,68,68,0.9), 0 0 60px rgba(239,68,68,0.3); }
      }
      .kill-glow { animation: kill-pulse 0.6s ease-in-out 2; }
      @keyframes streak-shine {
        0% { background-position: -200% center; }
        100% { background-position: 200% center; }
      }
      .streak-text {
        background: linear-gradient(90deg, #facc15, #fff, #facc15);
        background-size: 200%;
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: streak-shine 1.5s ease-in-out infinite;
      }
      .custom-scrollbar::-webkit-scrollbar { width: 4px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(239,68,68,0.4); border-radius: 2px; }
    </style>
    <script type="module" crossorigin src="./assets/index-CGZYzfzA.js"></script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
